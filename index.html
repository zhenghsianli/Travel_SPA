<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>桃園親子一日遊 v5</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.section{display:none}
.section.active{display:block}

.navbtn{
padding:8px 14px;
border-radius:8px;
background:#f1f5f9;
}

.card{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:10px;
}

.timeline{
border-left:4px solid #3b82f6;
padding-left:12px;
margin-bottom:16px;
}

iframe{
width:100%;
height:250px;
border:0;
border-radius:8px;
}

</style>

</head>

<body class="bg-gray-50 text-gray-800">


<!-- NAV -->

<div class="bg-white shadow sticky top-0">

<div class="max-w-6xl mx-auto flex flex-wrap gap-2 p-4">

<button class="navbtn" onclick="show('overview')">總覽</button>
<button class="navbtn" onclick="show('timeline')">行程</button>
<button class="navbtn" onclick="show('map')">地圖</button>
<button class="navbtn" onclick="show('parking')">停車</button>
<button class="navbtn" onclick="show('food')">美食</button>
<button class="navbtn" onclick="show('cost')">費用</button>
<button class="navbtn" onclick="show('transport')">交通</button>

</div>

</div>



<div class="max-w-6xl mx-auto p-4">


<!-- OVERVIEW -->

<div id="overview" class="section active">

<h1 class="text-2xl font-bold mb-4">

2026/3/15 桃園親子一日遊

</h1>

<div class="card">

出發：新莊頭前路  
預約：義百代11:00  
人數：4人  

</div>

</div>



<!-- TIMELINE -->

<div id="timeline" class="section">

<h2 class="text-xl font-bold mb-4">時間軸</h2>

<div id="timelineList"></div>

</div>



<!-- MAP -->

<div id="map" class="section">

<div class="card">
義百代
<iframe src="https://maps.google.com/maps?q=義百代桃園店&output=embed"></iframe>
</div>

<div class="card">
月眉濕地
<iframe src="https://maps.google.com/maps?q=月眉濕地&output=embed"></iframe>
</div>

<div class="card">
大溪老街
<iframe src="https://maps.google.com/maps?q=大溪老街&output=embed"></iframe>
</div>

</div>



<!-- PARKING -->

<div id="parking" class="section">

<div class="card">
大溪橋停車場
<a target="_blank"
href="https://maps.google.com/?q=大溪橋停車場"
class="text-blue-600">Google Maps</a>
</div>

<div class="card">
月眉停車
<a target="_blank"
href="https://maps.google.com/?q=月眉濕地停車場"
class="text-blue-600">Google Maps</a>
</div>

</div>



<!-- FOOD -->

<div id="food" class="section">

<div class="card">午餐預估 900</div>
<div class="card">點心預估 800</div>

</div>



<!-- COST -->

<div id="cost" class="section">

<h2 class="text-xl font-bold mb-4">

費用統計

</h2>

<canvas id="costChart"></canvas>

<div id="total" class="card"></div>

</div>



<!-- TRANSPORT -->

<div id="transport" class="section">

<h2 class="text-xl font-bold mb-4">

交通統計

</h2>

<canvas id="transportChart"></canvas>

</div>


</div>



<script>


function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}



const trips=[

{time:"09:50 出發",drive:50,km:35,fuel:120},

{time:"11:00 義百代",stay:60},

{time:"12:20 月眉",drive:20,km:12,fuel:40},

{time:"14:00 老街",food:900,snack:800,parking:50},

{time:"16:30 回程",drive:50,km:35,fuel:120}

]



function renderTimeline(){

let html=""

trips.forEach(t=>{

html+=`<div class="timeline">

<b>${t.time}</b><br>

${t.drive?`🚗 ${t.drive}分鐘 ${t.km}km $${t.fuel}`:""}

${t.food?`<br>🍜 ${t.food}`:""}

${t.snack?`<br>🍡 ${t.snack}`:""}

${t.parking?`<br>🅿 ${t.parking}`:""}

</div>`

})

document.getElementById("timelineList").innerHTML=html

}

renderTimeline()



const fuel=280
const parking=50
const meal=900
const snack=800

const total=fuel+parking+meal+snack

document.getElementById("total").innerHTML="總費用 "+total+" 元"



new Chart(

document.getElementById("costChart"),

{
type:"bar",
data:{
labels:["油錢","停車","午餐","點心"],
datasets:[{data:[fuel,parking,meal,snack]}]
}
}

)



new Chart(

document.getElementById("transportChart"),

{
type:"bar",
data:{
labels:["時間","距離","油錢"],
datasets:[{data:[120,82,280]}]
}
}

)

</script>

</body>
</html>
