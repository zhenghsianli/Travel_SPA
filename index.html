<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>旅遊規劃 V8 Final</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.section{display:none}
.section.active{display:block}
.navbtn{padding:6px 10px;background:#e5e7eb;border-radius:6px}
.card{background:white;padding:10px;margin:8px;border-radius:8px}
.timeline{border-left:4px solid blue;padding-left:8px;margin:6px}
</style>

</head>

<body class="bg-gray-100">

<!-- NAV -->

<div class="p-2 bg-white flex gap-2 flex-wrap">

<button class="navbtn" onclick="show('timeline')">行程</button>
<button class="navbtn" onclick="show('food')">美食</button>
<button class="navbtn" onclick="show('parking')">停車</button>
<button class="navbtn" onclick="show('cost')">費用</button>
<button class="navbtn" onclick="show('traffic')">交通</button>

</div>


<div class="p-4 max-w-4xl mx-auto">

<!-- TIMELINE -->

<div id="timeline" class="section active">

<h2>行程</h2>

<div id="timelineList"></div>

</div>


<!-- FOOD -->

<div id="food" class="section">

<h2>美食</h2>

<div id="foodList"></div>

</div>


<!-- PARKING -->

<div id="parking" class="section">

<h2>停車場</h2>

<div id="parkingList"></div>

</div>


<!-- COST -->

<div id="cost" class="section">

<h2>費用統計</h2>

<table class="table-auto border">

<tr><th>項目</th><th>金額</th></tr>

<tr><td>餐費</td><td id="foodCost"></td></tr>
<tr><td>油錢</td><td id="fuelCost"></td></tr>
<tr><td>停車</td><td id="parkCost"></td></tr>
<tr><td>總計</td><td id="totalCost"></td></tr>

</table>

<canvas id="pie"></canvas>

</div>


<!-- TRAFFIC -->

<div id="traffic" class="section">

<h2>交通</h2>

<canvas id="bar"></canvas>

</div>


</div>



<script>

function show(id){

document.querySelectorAll(".section")
.forEach(x=>x.classList.remove("active"))

document.getElementById(id).classList.add("active")

}



/////////////////////

// 行程 JSON

/////////////////////

const spots=[

{ name:"新莊", lat:25.03, lng:121.45 },

{ name:"義百代", lat:24.99, lng:121.31, cost:2000 },

{ name:"月眉濕地", lat:24.88, lng:121.28 },

{ name:"大溪老街", lat:24.88, lng:121.29, cost:800, parking:50 }

]



/////////////////////

// 停車場

/////////////////////

const parking=[

{ name:"義百代停車", map:"https://maps.google.com/?q=桃園市桃園區大誠路2號" },

{ name:"月眉停車", map:"https://maps.google.com/?q=月眉濕地停車場" },

{ name:"大溪橋停車場", map:"https://maps.google.com/?q=大溪橋停車場" }

]



/////////////////////

// 美食

/////////////////////

const food=[

{ name:"義百代", addr:"桃園", map:"https://maps.google.com/?q=桃園市桃園區大誠路2號" },

{ name:"大溪豆干", addr:"大溪", map:"https://maps.google.com/?q=大溪豆干" },

{ name:"老街香腸", addr:"大溪", map:"https://maps.google.com/?q=大溪老街" },

{ name:"老街豆花", addr:"大溪", map:"https://maps.google.com/?q=大溪豆花" }

]



/////////////////////

// 距離

/////////////////////

function dist(a,b){

let dx=a.lat-b.lat

let dy=a.lng-b.lng

return Math.sqrt(dx*dx+dy*dy)*111

}

function fuel(km){

return km/12*30

}

function time(km){

return km/40*60

}



/////////////////////

// Timeline

/////////////////////

let fuelTotal=0

let timeList=[]

let html=""

for(let i=0;i<spots.length-1;i++){

let d=dist(spots[i],spots[i+1])

let f=fuel(d)

let t=time(d)

fuelTotal+=f

timeList.push(Math.round(t))

html+=`<div class=timeline>

${spots[i].name} → ${spots[i+1].name}

<br>

距離 ${d.toFixed(1)} km

<br>

時間 ${t.toFixed(0)} 分

<br>

油錢 ${f.toFixed(0)}

</div>`

}

document.getElementById("timelineList").innerHTML=html



/////////////////////

// 美食

/////////////////////

let fhtml=""

food.forEach(x=>{

fhtml+=`<div class=card>

${x.name}

<br>

${x.addr}

<br>

<a target=_blank href=${x.map}>MAP</a>

</div>`

})

document.getElementById("foodList").innerHTML=fhtml



/////////////////////

// 停車

/////////////////////

let phtml=""

parking.forEach(x=>{

phtml+=`<div class=card>

${x.name}

<br>

<a target=_blank href=${x.map}>MAP</a>

</div>`

})

document.getElementById("parkingList").innerHTML=phtml



/////////////////////

// 費用

/////////////////////

let foodCost=0

let parkCost=0

spots.forEach(s=>{

if(s.cost)foodCost+=s.cost

if(s.parking)parkCost+=s.parking

})

let total=foodCost+parkCost+fuelTotal

document.getElementById("foodCost").innerText=foodCost.toFixed(0)
document.getElementById("fuelCost").innerText=fuelTotal.toFixed(0)
document.getElementById("parkCost").innerText=parkCost
document.getElementById("totalCost").innerText=total.toFixed(0)



/////////////////////

// PIE

/////////////////////

new Chart(pie,{

type:"pie",

data:{

labels:["餐費","油錢","停車"],

datasets:[{

data:[foodCost,fuelTotal,parkCost]

}]

}

})



/////////////////////

// BAR

/////////////////////

new Chart(bar,{

type:"bar",

data:{

labels:["1","2","3"],

datasets:[{

data:timeList

}]

}

})

</script>

</body>
</html>
