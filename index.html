<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>桃園親子一日遊 v4</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.section{display:none}
.section.active{display:block}

.navbtn{
padding:8px 14px;
border-radius:8px;
background:#f1f5f9;
}

.card{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:10px;
}

.timeline{
border-left:4px solid #3b82f6;
padding-left:12px;
margin-bottom:16px;
}

</style>

</head>

<body class="bg-gray-50 text-gray-800">


<!-- NAV -->

<div class="bg-white shadow sticky top-0">

<div class="max-w-6xl mx-auto flex flex-wrap gap-2 p-4">

<button class="navbtn" onclick="show('overview')">總覽</button>
<button class="navbtn" onclick="show('timeline')">行程</button>
<button class="navbtn" onclick="show('parking')">停車</button>
<button class="navbtn" onclick="show('food')">美食</button>
<button class="navbtn" onclick="show('cost')">費用</button>

</div>

</div>



<div class="max-w-6xl mx-auto p-4">


<!-- OVERVIEW -->

<div id="overview" class="section active">

<h1 class="text-2xl font-bold mb-4">

2026/3/15 桃園親子一日遊

</h1>

<div class="card">

<p>出發：新莊頭前路</p>
<p>預約：義百代 11:00</p>
<p>人數：4人</p>

</div>

</div>



<!-- TIMELINE -->

<div id="timeline" class="section">

<h2 class="text-xl font-bold mb-4">

時間軸

</h2>

<div id="timelineList"></div>

</div>



<!-- PARKING -->

<div id="parking" class="section">

<h2 class="text-xl font-bold mb-4">

停車

</h2>

<div class="card">

義百代停車

<a target="_blank"
class="text-blue-600"
href="https://maps.google.com/?q=義百代桃園店">

Google Maps

</a>

</div>

<div class="card">

月眉停車

<a target="_blank"
class="text-blue-600"
href="https://maps.google.com/?q=月眉濕地停車場">

Google Maps

</a>

</div>

<div class="card">

大溪橋停車

<a target="_blank"
class="text-blue-600"
href="https://maps.google.com/?q=大溪橋停車場">

Google Maps

</a>

</div>

</div>



<!-- FOOD -->

<div id="food" class="section">

<h2 class="text-xl font-bold mb-4">

美食

</h2>

<div class="card">午餐預估 900</div>
<div class="card">老街點心 800</div>

</div>



<!-- COST -->

<div id="cost" class="section">

<h2 class="text-xl font-bold mb-4">

費用統計

</h2>

<canvas id="chart"></canvas>

<div id="total" class="card"></div>

</div>


</div>



<script>


function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}



const trips=[

{
time:"09:50 出發",
drive:50,
fuel:120,
parking:0
},

{
time:"11:00 義百代",
stay:60,
parking:0
},

{
time:"12:20 月眉",
drive:20,
fuel:40,
parking:0
},

{
time:"14:00 老街",
stay:120,
food:900,
snack:800,
parking:50
},

{
time:"16:30 回程",
drive:50,
fuel:120
}

]



function renderTimeline(){

let html=""

trips.forEach(t=>{

html+=`<div class="timeline">

<b>${t.time}</b><br>

${t.drive?`🚗 ${t.drive}分鐘 $${t.fuel}`:""}

${t.food?`<br>🍜 ${t.food}`:""}

${t.snack?`<br>🍡 ${t.snack}`:""}

${t.parking?`<br>🅿 ${t.parking}`:""}

</div>`

})

document.getElementById("timelineList").innerHTML=html

}

renderTimeline()



const fuel=280
const parking=50
const meal=900
const snack=800

const total=fuel+parking+meal+snack

document.getElementById("total").innerHTML=

"總費用 "+total+" 元"



new Chart(

document.getElementById("chart"),

{

type:"bar",

data:{
labels:["油錢","停車","午餐","點心"],
datasets:[{
label:"費用",
data:[fuel,parking,meal,snack]
}]
}

}

)

</script>

</body>
</html>
