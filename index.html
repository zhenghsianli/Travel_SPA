<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>桃園親子一日遊 v7</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.section{display:none}
.section.active{display:block}
.navbtn{padding:8px 12px;background:#e5e7eb;border-radius:6px}
.card{background:white;padding:12px;border-radius:8px;margin-bottom:10px}
.timeline{border-left:4px solid #3b82f6;padding-left:10px;margin-bottom:10px}
iframe{width:100%;height:240px;border:0;border-radius:8px}
</style>

</head>
<body class="bg-gray-100">

<!-- NAV -->
<div class="bg-white shadow p-3 flex gap-2 flex-wrap">

<button class="navbtn" onclick="show('overview')">總覽</button>
<button class="navbtn" onclick="show('timeline')">行程</button>
<button class="navbtn" onclick="show('food')">美食</button>
<button class="navbtn" onclick="show('route')">路線</button>
<button class="navbtn" onclick="show('map')">地圖</button>
<button class="navbtn" onclick="show('parking')">停車</button>
<button class="navbtn" onclick="show('cost')">費用</button>

</div>

<div class="p-4 max-w-5xl mx-auto">

<!-- OVERVIEW -->

<div id="overview" class="section active">

<h1 class="text-2xl font-bold mb-3">

桃園親子一日遊

</h1>

<div class="card">

出發：新莊頭前路<br>

預約：義百代 11:00<br>

人數：

<input id="people" type="number" value="4" class="border w-16">

<button onclick="updateCost()">更新費用</button>

</div>

</div>


<!-- TIMELINE -->

<div id="timeline" class="section">

<h2 class="text-xl mb-2">時間軸</h2>

<div id="timelineList"></div>

</div>


<!-- FOOD -->

<div id="food" class="section">

<h2 class="text-xl mb-2">美食推薦</h2>

<div id="foodList"></div>

</div>


<!-- ROUTE -->

<div id="route" class="section">

<h2 class="text-xl mb-2">推薦行動路線</h2>

<div class="card">

新莊 → 義百代 → 月眉濕地 → 大溪橋停車場 →  
豆干 → 香腸 → 豆花 → 飲料 → 回停車場 → 回家

</div>

</div>


<!-- MAP -->

<div id="map" class="section">

<div class="card">

義百代

<iframe src="https://maps.google.com/maps?q=桃園市桃園區大誠路2號&output=embed"></iframe>

</div>

<div class="card">

月眉濕地

<iframe src="https://maps.google.com/maps?q=月眉濕地&output=embed"></iframe>

</div>

<div class="card">

大溪老街

<iframe src="https://maps.google.com/maps?q=大溪老街&output=embed"></iframe>

</div>

</div>


<!-- PARKING -->

<div id="parking" class="section">

<h2 class="text-xl mb-2">停車場推薦</h2>

<div class="card">
大溪橋停車場<br>
<a target="_blank"
href="https://maps.google.com/?q=大溪橋停車場">
Google Map
</a>
</div>

<div class="card">
月眉停車場<br>
<a target="_blank"
href="https://maps.google.com/?q=月眉停車場">
Google Map
</a>
</div>

<div class="card">
大溪老街停車場<br>
<a target="_blank"
href="https://maps.google.com/?q=大溪老街停車場">
Google Map
</a>
</div>

<div class="card">
橋頭停車場<br>
<a target="_blank"
href="https://maps.google.com/?q=大溪橋頭停車場">
Google Map
</a>
</div>

<div class="card">
康莊停車場<br>
<a target="_blank"
href="https://maps.google.com/?q=康莊停車場">
Google Map
</a>
</div>

</div>


<!-- COST -->

<div id="cost" class="section">

<h2 class="text-xl">費用統計</h2>

<canvas id="chart"></canvas>

<div id="total" class="card"></div>

</div>


</div>


<script>

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}


const food=[

{
name:"義百代",
addr:"桃園市桃園區大誠路2號",
desc:"午餐套餐",
map:"https://maps.google.com/?q=桃園市桃園區大誠路2號"
},

{
name:"大溪豆干",
addr:"桃園市大溪區中正路37號",
desc:"必吃",
map:"https://maps.google.com/?q=桃園市桃園區中正路37號"
},

{
name:"老街香腸",
addr:"大溪老街",
desc:"小吃",
map:"https://maps.google.com/?q=大溪老街"
},

{
name:"老街豆花",
addr:"大溪老街",
desc:"甜點",
map:"https://maps.google.com/?q=大溪老街豆花"
}

]


let html=""

food.forEach(f=>{
html+=`<div class="card">
<b>${f.name}</b><br>
${f.addr}<br>
${f.desc}<br>
<a target="_blank" href="${f.map}">
Google Map
</a>
</div>`
})

document.getElementById("foodList").innerHTML=html


const trips=[

{t:"出發",d:50,f:120},
{t:"午餐",c:2000},
{t:"移動",d:20,f:40},
{t:"老街",c:800,p:50},
{t:"回程",d:50,f:120}

]


function renderTimeline(){

let h=""

trips.forEach(x=>{

h+=`<div class="timeline">${x.t}`

if(x.d)h+=` 🚗${x.d}分 $${x.f}`
if(x.c)h+=` 🍜${x.c}`
if(x.p)h+=` 🅿${x.p}`

h+="</div>"

})

document.getElementById("timelineList").innerHTML=h

}

renderTimeline()


function updateCost(){

let p=parseInt(document.getElementById("people").value)

let meal=p*500
let snack=p*200
let fuel=280
let parking=50

let total=meal+snack+fuel+parking

document.getElementById("total").innerHTML=
"總費用 "+total


new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:["午餐","點心","油","停車"],
datasets:[{
data:[meal,snack,fuel,parking]
}]
}
}
)

}

updateCost()

</script>

</body>
</html>
